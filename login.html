<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - スケジュール表</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      border-radius: 10px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: center;
    }

    .login-card h1 {
      font-size: 1.3rem;
      color: #2c3e50;
      margin-bottom: 8px;
    }

    .login-card p {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 32px;
    }

    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #3c4043;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s;
      width: 100%;
      justify-content: center;
    }

    .btn-google:hover {
      background: #f8f9fa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .btn-google svg {
      flex-shrink: 0;
    }

    .error {
      background: #fde8e8;
      color: #c0392b;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>スケジュール表</h1>
    <p>続けるには Google アカウントでログインしてください</p>

    <div id="error-msg" class="error hidden"></div>

    <a href="/api/auth/login" class="btn-google">
      <!-- Google G ロゴ -->
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Google でログイン
    </a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const errorParam = params.get('error');
    const errorMsg = document.getElementById('error-msg');
    const errorMessages = {
      cancelled: 'ログインがキャンセルされました',
      invalid_state: '無効なリクエストです。再度お試しください',
      token_failed: '認証トークンの取得に失敗しました。再度お試しください',
      userinfo_failed: 'ユーザー情報の取得に失敗しました。再度お試しください',
      unauthorized: 'このアカウントはアクセスが許可されていません',
    };
    if (errorParam && errorMessages[errorParam]) {
      errorMsg.textContent = errorMessages[errorParam];
      errorMsg.classList.remove('hidden');
    }
  </script>
</body>
</html>
